name: 🐛 Bug Report
description: Report something that isn't working as expected
title: "[BUG] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out this form to help us understand and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: 📝 Description
      description: What went wrong? Be as specific as possible.
      placeholder: "I tried to set up the template, but..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔧 Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Clone the repository
        2. Run `./init.sh`
        3. Run `mdbook serve`
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: What should have happened?
      placeholder: "The site should deploy automatically..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: What actually happened?
      placeholder: "The GitHub Actions workflow failed with..."
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 🖥️ Operating System
      description: What OS are you using?
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 🔍 Environment Details
      description: Any relevant software versions?
      placeholder: |
        - mdbook version: 0.4.x
        - Git version: 2.x
      validations:
        required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 📸 Screenshots / Error Output
      description: If applicable, paste error messages or screenshots
      placeholder: "Paste error logs or screenshots here..."
      validations:
        required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Checklist
      options:
        - label: I've searched for similar issues
          required: true
        - label: I've checked the documentation
          required: true
        - label: I've provided enough detail to reproduce the issue
          required: true