name: ❓ Question
description: Ask a question about the content
title: "[QUESTION] "
labels: ["question"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're here to help!

  - type: textarea
    id: question
    attributes:
      label: ❓ Your Question
      description: What would you like to know?
      placeholder: "I'm confused about... How do I...?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 📍 Context
      description: Where did you encounter this? Which chapter/section?
      placeholder: |
        Chapter: 
        Section:
        Or topic:
    validations:
      required: true

  - type: textarea
    id: attempted
    attributes:
      label: 🔍 What Have You Tried?
      description: What have you already explored or attempted?
      placeholder: "I've already checked..."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Before Posting
      options:
        - label: I've read the relevant sections
          required: true
        - label: I've searched for similar questions
          required: true